<!DOCTYPE html>
<html lang="pt-BR" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#161b22">
<meta name="description" content="Consulta, verificação e cálculo de normas de manutenção predial (NBR/NR) — offline.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Engenharia Elétrica · Normas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="logo">N</div>
  <h1>NORMAS<small>Engenharia Elétrica</small></h1>
  <div class="right">
    <button class="iconbtn" id="install" title="Instalar" style="display:none">⤓</button>
    <span class="badge-net" id="net">online</span>
    <span class="badge-net" id="pend" title="Pendentes de envio" style="display:none;color:var(--amber);border-color:var(--amber)">0</span>
    <button class="iconbtn" id="acct" title="Conta">👤</button>
    <button class="iconbtn" id="tt" title="Tema">☀️</button>
  </div>
</header>

<div id="updbar" style="display:none;align-items:center;gap:10px;justify-content:center;background:var(--amber);color:#1a1205;padding:8px;font-size:13px;font-weight:600">
  Nova versão disponível
  <button id="updbtn" style="background:#1a1205;color:var(--amber);border:none;border-radius:6px;padding:4px 12px;font-weight:700;cursor:pointer">Atualizar</button>
</div>

<main id="app"></main>

<nav>
  <button data-t="Home"><span class="ni">🏠</span>Início</button>
  <button data-t="Biblioteca"><span class="ni">📚</span>Normas</button>
  <button data-t="Calculos"><span class="ni">🧮</span>Cálculos</button>
  <button data-t="Checklists"><span class="ni">✓</span>Vistoria</button>
  <button data-t="Prazos"><span class="ni">📅</span>Prazos</button>
</nav>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/cemig.js"></script>
<script src="js/app.js"></script>
</body>
</html>
